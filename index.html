<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>websto — We build applications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-card: rgba(17, 17, 24, 0.85);
            --border: rgba(99, 102, 241, 0.3);
            --accent: #6366f1;
            --accent-dim: #818cf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body {
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
                radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.08), transparent),
                var(--bg-dark);
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(16px, 4vw, 32px);
        }

        .terminal-window {
            width: 100%;
            max-width: 720px;
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            overflow: hidden;
        }

        .title-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--border);
        }

        .window-buttons {
            display: flex;
            gap: 6px;
        }

        .btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            opacity: 0.8;
        }
        .red { background: #ef4444; }
        .yellow { background: #f59e0b; }
        .green { background: #22c55e; }

        .title {
            flex: 1;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .terminal-content {
            padding: clamp(20px, 5vw, 32px);
            min-height: 200px;
            overflow-y: auto;
        }

        .terminal {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(13px, 2vw, 15px);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            color: var(--text-primary);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            margin-left: 2px;
            background: var(--accent);
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .bios-footer {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-secondary);
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        .link {
            color: var(--accent-dim);
            text-decoration: none;
            transition: color 0.2s;
        }
        .link:hover {
            color: var(--accent);
        }

        @media (max-width: 600px) {
            .terminal-window {
                border-radius: 12px;
            }
            .title-bar {
                padding: 10px 16px;
            }
            .terminal-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="terminal-window">
            <div class="title-bar">
                <div class="window-buttons">
                    <span class="btn red"></span>
                    <span class="btn yellow"></span>
                    <span class="btn green"></span>
                </div>
                <div class="title">websto — terminal</div>
            </div>

            <div class="terminal-content" id="scrollArea">
                <div class="terminal" id="terminal">
                    <span id="output"></span><span id="cursor" class="cursor"></span>
                </div>
            </div>

            <div class="bios-footer">
                Press DELETE or F2 to enter SETUP
            </div>
        </div>
    </div>

    <script>
        const output = document.getElementById("output");
        const cursor = document.getElementById("cursor");
        const scrollArea = document.getElementById("scrollArea");

        cursor.style.visibility = "hidden";

        const lines = [
            "",
            "Processor: Intel Core i9 @ 5400MHz",
            "System Memory: 65536 MB OK",
            "PCI Device Listing...",
            "Found 8 PCI Devices",
            "",
            "Initializing websto modules...",
            "Loading drivers: creativity.sys OK",
            "Injecting motivation into kernel...",
            "Connection test: FAILED",
            "",
            "We build applications.",
            "We automate the impossible.",
            "If it breaks, it is probably a feature.",
            "Turning coffee into code since deployment failed.",
            "Please wait... convincing hardware to cooperate."
        ];

        const finalLine = "www.websto.cz";

        let lineIndex = 0;
        let charIndex = 0;

        function scrollDown() {
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        function typeLine() {
            if (lineIndex >= lines.length) {
                setTimeout(typeFinal, 1500);
                return;
            }

            const line = lines[lineIndex];

            if (charIndex < line.length) {
                output.textContent += line[charIndex];
                charIndex++;
                scrollDown();
                setTimeout(typeLine, 35 + Math.random() * 45);
            } else {
                output.textContent += "\n";
                lineIndex++;
                charIndex = 0;
                scrollDown();
                setTimeout(typeLine, 600);
            }
        }

        let finalIndex = 0;

        function typeFinal() {
            if (finalIndex < finalLine.length) {
                output.textContent += finalLine[finalIndex];
                finalIndex++;
                scrollDown();
                setTimeout(typeFinal, 55);
            } else {
                wrapFinalInLink();
            }
        }

        function wrapFinalInLink() {
            const text = output.textContent;
            const url = "https://www.websto.cz";
            output.innerHTML = text.replace(finalLine, `<a href="${url}" class="link" target="_blank" rel="noopener">${finalLine}</a>`);
        }

        setTimeout(() => {
            cursor.style.visibility = "visible";
            typeLine();
        }, 1800);
    </script>
</body>
</html>
