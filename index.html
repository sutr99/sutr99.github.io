<!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEBSTO</title>

<style>
:root{
  --accent:#2d7ef7;
  --bg:#f4f6f8;
  --text:#1f2933;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:white;
  width:460px;
  max-width:92%;
  padding:38px 34px;
  border-radius:16px;
  box-shadow:0 12px 28px rgba(0,0,0,0.18);
  text-align:center;
}

h1{
  margin:0 0 10px 0;
  letter-spacing:1px;
}

p{
  margin:0 0 25px 0;
  color:#556;
}

a.button{
  display:block;
  padding:14px;
  border-radius:10px;
  background:var(--accent);
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.2s;
}

a.button:hover{
  background:#1e63c7;
  transform:translateY(-1px);
}

.footer{
  margin-top:22px;
  font-size:13px;
  color:#889;
}
</style>

</head>

<body>

<div class="card">
  <h1>WEBSTO</h1>
  <p>Jednoduché webové nástroje a interní aplikace.</p>

  <a class="button" href="https://cukrarna.websto.cz">
    Cukrářské kalkulačky
  </a>

  <div class="footer">
    © WEBSTO
  </div>
</div>

</body>
</html>
