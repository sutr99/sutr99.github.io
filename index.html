<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>websto</title>

<style>
html, body{
    margin:0;
    padding:0;
    background:#000099;
    height:100%;
    overflow:hidden;
    font-family: 'Courier New', monospace;
    color:#ffff55;
}

/* PAGE POSITIONING */
.page{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    box-sizing:border-box;
}

/* TERMINAL WINDOW */
.terminal-window{
    width:100%;
    height:100%;
    background:#000099;
    border:0;
    border-radius:0;
    box-shadow:none;
    display:flex;
    flex-direction:column;
}

/* TITLE BAR */
.title-bar{
    background:#000099;
    height:auto;
    padding:2px 0;
    border:0;
    display:block;
    text-align:center;
    color:#ffff55;
    font-size:12px;
    border-bottom:1px solid #ffff55;
}

.window-buttons{
    display:none;
}

.btn{
    width:12px;
    height:12px;
    border-radius:50%;
}
.red{background:#ff5f56;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.title{
    position:static;
    transform:none;
    font-size:12px;
    color:#ffff55;
    opacity:1;
    padding:2px;
}

/* TERMINAL CONTENT */
.terminal-content{
    flex:1;
    padding:20px;
    overflow-y:auto;
    background:#000099;
    border:0;
    box-shadow:none;
}

/* TERMINAL TEXT */
.terminal{
    line-height:1.4;
    white-space:pre-wrap;
    word-break:break-word;
    font-size:14px;
}

/* CURSOR */
.cursor{
    display:inline-block;
    width:8px;
    height:14px;
    margin:0 2px;
    background:#ffff55;
    animation:blink 1s steps(1) infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* BIOS FOOTER */
.bios-footer{
    padding:2px 4px;
    background:#000099;
    border-top:1px solid #ffff55;
    color:#ffff55;
    font-size:11px;
    text-align:right;
}

/* MOBILE */
@media (max-width:600px){
    .terminal-window{
        height:100vh;
    }
    .terminal-content{
        padding:12px;
    }
    .terminal{
        font-size:12px;
    }
    .title-bar, .bios-footer{
        font-size:10px;
    }
}
</style>
</head>

<body>

<div class="page">
    <div class="terminal-window">
        <div class="title-bar">
            <div class="title">AMI BIOS (C)2023 American Megatrends Inc. - websto Systems</div>
        </div>

        <div class="terminal-content" id="scrollArea">
            <div class="terminal" id="terminal">
                <span id="output"></span><span id="cursor" class="cursor"></span>
            </div>
        </div>
        
        <div class="bios-footer">
            Press DELETE or F2 to enter SETUP
        </div>
    </div>
</div>

<script>
const output = document.getElementById("output");
const cursor = document.getElementById("cursor");
const scrollArea = document.getElementById("scrollArea");

cursor.style.display = "none";

const lines = [
"",
"Processor: Intel Core i9 @ 5400MHz",
"System Memory: 65536 MB OK",
"PCI Device Listing...",
"Found 8 PCI Devices",
"",
"Initializing websto modules...",
"Loading drivers: creativity.sys OK",
"Injecting motivation into kernel...",
"Connection test: FAILED",
"",
"We build applications.",
"We automate the impossible.",
"If it breaks, it is probably a feature.",
"Turning coffee into code since deployment failed.",
"Please wait... convincing hardware to cooperate."
];

const finalLine = "www.websto.cz";

let lineIndex = 0;
let charIndex = 0;

function scrollDown(){
    scrollArea.scrollTop = scrollArea.scrollHeight;
}

function typeLine(){
    if(lineIndex >= lines.length){
        setTimeout(typeFinal,1500);
        return;
    }

    const line = lines[lineIndex];

    if(charIndex < line.length){
        output.textContent += line[charIndex];
        charIndex++;
        scrollDown();
        setTimeout(typeLine, 40 + Math.random()*50);
    }else{
        output.textContent += "\n";
        lineIndex++;
        charIndex = 0;
        scrollDown();
        setTimeout(typeLine, 700);
    }
}

let finalIndex = 0;

function typeFinal(){
    if(finalIndex < finalLine.length){
        output.textContent += finalLine[finalIndex];
        finalIndex++;
        scrollDown();
        setTimeout(typeFinal, 60);
    }
}

setTimeout(()=>{
    cursor.style.display = "inline-block";
    typeLine();
},2000);
</script>

</body>
</html>
